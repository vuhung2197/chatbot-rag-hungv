# ============================================
# SonarQube Project Configuration
# English Chatbot - Full Stack Analysis
# ============================================

# Project identification
sonar.projectKey=english-chatbot
sonar.projectName=English Chatbot
sonar.projectVersion=1.0.0

# ============================================
# Source code paths
# ============================================
sonar.sources=backend/src,backend/index.js,backend/db.js,backend/services,backend/utils,backend/helpers,backend/middlewares,backend/bootstrap,frontend/src

# ============================================
# Exclusions
# ============================================
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/coverage/**,\
  **/.git/**,\
  **/backups/**,\
  **/docs/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/test/**,\
  **/.agent/**,\
  **/.analysis/**,\
  **/.archive/**

# ============================================
# Language & Encoding
# ============================================
sonar.sourceEncoding=UTF-8

# ============================================
# JavaScript/TypeScript Coverage (if available)
# ============================================
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ============================================
# ESLint external issues (optional)
# Generate reports first:
#   cd backend && npx eslint . -f json -o eslint-report.json || true
#   cd frontend && npx eslint src -f json -o eslint-report.json || true
# ============================================
# sonar.eslint.reportPaths=backend/eslint-report.json,frontend/eslint-report.json

# ============================================
# SonarQube Server Configuration
# ============================================
sonar.host.url=http://localhost:9000

# Authentication token (uncomment and replace after generating token)
# Steps: Login http://localhost:9000 > My Account > Security > Generate Token
